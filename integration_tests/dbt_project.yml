name: credit_risk_integration_tests
version: "0.1.0"
config-version: 2

profile: credit_risk_integration_tests

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros", "../macros"]

dispatch:
  - macro_namespace: credit_risk
    search_order: ["credit_risk_integration_tests"]

target-path: "target"
clean-targets:
  - "target"

models:
  credit_risk_integration_tests:
    +materialized: table

seeds:
  credit_risk_integration_tests:
    loan_performance:
      +column_types:
        loan_id: varchar
        period_date: date
        delinquency_bucket: varchar
        outstanding_balance: double
        loan_status: varchar
    expected_roll_rate_matrix:
      +column_types:
        observation_period: date
        from_bucket: varchar
        to_bucket: varchar
        transition_loan_count: integer
        at_risk_loan_count: integer
        transition_balance: double
        at_risk_balance: double
        transition_rate: double
        transition_balance_rate: double
        is_low_count_cell: boolean
    loan_performance_segmented:
      +column_types:
        loan_id: varchar
        period_date: date
        delinquency_bucket: varchar
        outstanding_balance: double
        loan_status: varchar
        product_type: varchar
    loan_performance_vintage:
      +column_types:
        loan_id: varchar
        origination_date: date
        performance_date: date
        is_default: boolean
        is_prepayment: boolean
        beginning_balance: double
        loan_status: varchar
    expected_vintage_curve:
      +column_types:
        origination_cohort: date
        months_on_book: integer
        cohort_loan_count: integer
        cohort_principal: double
        cumulative_default_count: integer
        cumulative_prepayment_count: integer
        surviving_non_defaulted_count: integer
        loans_at_risk_count: integer
        cumulative_default_rate: double
        cumulative_prepayment_rate: double
        is_censored: boolean
    loan_performance_cpr:
      +column_types:
        loan_id: varchar
        origination_date: date
        performance_date: date
        beginning_balance: double
        prepaid_amount: double
        is_active: boolean
        is_prepayment: boolean
    expected_cpr_smm:
      +column_types:
        origination_cohort: date
        months_on_book: integer
        performing_pool_balance: double
        prepaid_balance: double
        eligible_loan_count: integer
        prepaying_loan_count: integer
        smm_rate: double
        cpr_rate: double
    loan_performance_cpr_inactive:
      +column_types:
        loan_id: varchar
        origination_date: date
        performance_date: date
        beginning_balance: double
        prepaid_amount: double
        is_active: boolean
        is_prepayment: boolean
